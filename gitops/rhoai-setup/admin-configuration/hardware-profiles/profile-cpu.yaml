apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/dashboard-feature-visibility: '[]'
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: Profile - CPU
  name: profile-cpu
  namespace: redhat-ods-applications
spec:
  identifiers:
  - defaultCount: 2
    displayName: CPU
    identifier: cpu
    maxCount: '24'
    minCount: 1
    resourceType: CPU
  - defaultCount: 2Gi
    displayName: Memory
    identifier: memory
    maxCount: 64Gi
    minCount: 2Gi
    resourceType: Memory