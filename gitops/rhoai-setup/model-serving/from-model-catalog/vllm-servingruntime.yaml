apiVersion: template.openshift.io/v1
kind: Template
metadata:
  annotations:
    description: Red Hat AI Inference Server ServingRuntime with CUDA support (for NVIDIA GPUs)
    opendatahub.io/apiProtocol: REST
    opendatahub.io/model-type: '["generative"]'
    opendatahub.io/modelServingSupport: '["single"]'
    openshift.io/display-name: RHAIIS NVIDIA GPU ServingRuntime for KServe
    openshift.io/provider-display-name: Red Hat, Inc.
    tags: rhods,rhoai,kserve,servingruntime,vllm,rhaiis,inference
    template.openshift.io/documentation-url: https://docs.redhat.com/en/documentation/red_hat_ai_inference_server/
    template.openshift.io/long-description: >-
      This template defines resources needed to deploy Red Hat AI Inference Server (vLLM)
      NVIDIA GPU ServingRuntime with KServe in Red Hat OpenShift AI
  labels:
    opendatahub.io/dashboard: "true"
  name: rhaiis-cuda
  namespace: redhat-ods-applications
objects:
- apiVersion: serving.kserve.io/v1alpha1
  kind: ServingRuntime
  metadata:
    annotations:
      opendatahub.io/apiProtocol: REST
      opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
      opendatahub.io/runtime-version: v0.18.0
      opendatahub.io/template-display-name: vLLM NVIDIA GPU ServingRuntime for KServe
    labels:
      opendatahub.io/dashboard: "true"
    name: rhaiis-cuda-runtime
    namespace: redhat-ods-applications
  spec:
    annotations:
      opendatahub.io/kserve-runtime: vllm
      prometheus.io/path: /metrics
      prometheus.io/port: "8080"
    containers:
    - args:
      - --port=8080
      - --model=/mnt/models
      - --served-model-name={{.Name}}
      command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      env:
      - name: HF_HOME
        value: /tmp/hf_home
      image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
      name: kserve-container
      ports:
      - containerPort: 8080
        protocol: TCP
    multiModel: false
    supportedModelFormats:
    - autoSelect: true
      name: vLLM
