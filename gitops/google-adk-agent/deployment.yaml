apiVersion: apps/v1
kind: Deployment
metadata:
  name: google-adk-agent
  namespace: google-adk-agent
  labels:
    app.kubernetes.io/name: google-adk-agent
    app.kubernetes.io/part-of: rhoai-demos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: google-adk-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: google-adk-agent
        app.kubernetes.io/part-of: rhoai-demos
    spec:
      serviceAccountName: google-adk-agent
      containers:
        - name: agent
          image: quay.io/rh-ee-hshishir/google-adk-agent:2.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: google-adk-agent-config
            - secretRef:
                name: google-adk-agent-secret
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
