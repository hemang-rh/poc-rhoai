apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: google-adk-agent
  namespace: google-adk-agent
  labels:
    app.kubernetes.io/name: google-adk-agent
    app.kubernetes.io/part-of: rhoai-demos
spec:
  runPolicy: Serial
  source:
    type: Dockerfile
    dockerfile: |
      FROM python:3.11-slim
      WORKDIR /opt/google-adk-agent
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      EXPOSE 8080
      CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: DockerImage
        name: python:3.11-slim
  output:
    to:
      kind: ImageStreamTag
      name: google-adk-agent:latest
  triggers: []
